receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  prometheus:
    endpoint: 0.0.0.0:8889
  elasticsearch:
    endpoints: ["http://elasticsearch:9200"]
    logs_index: "otel-logs"
    # NOTE: requires otel-collector pinned to ~0.96.0 (see docker-compose.yml) —
    # newer collector builds (0.15x) use ES 8.15+/9.x bulk-indexing semantics
    # and 400 ("illegal_argument_exception") on every flush against the pinned
    # elasticsearch:8.10.2 below. Verified working end-to-end at 0.96.0; see README §17.
  debug:
    verbosity: detailed

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus, debug]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [elasticsearch, debug]
